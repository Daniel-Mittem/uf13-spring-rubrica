<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <title>Lista contatti</title>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <div>
                <h1 class="display-5 mb-1">Spring Rubrica</h1>
                <p class="text-muted mb-0">Gestisci i tuoi contatti con semplicità.</p>
            </div>
            <a th:href="@{/new}" class="btn btn-primary btn-lg">Nuovo Contatto</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h4 mb-3">Lista contatti</h2>

                <div th:if="${deletedContact != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Fatto!</strong> Contatto eliminato.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${#lists.isEmpty(contacts)}" class="text-center py-5">
                    <i class="bi bi-people-fill fs-1 text-secondary"></i>
                    <p class="mt-3 mb-0 fs-5">Nessun contatto presente.</p>
                </div>

                <div th:if="${!#lists.isEmpty(contacts)}" class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>Cognome</th>
                                <th>Telefono</th>
                                <th>Email</th>
                                <th class="text-center">Azioni</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${contacts}">
                                <td th:text="${c.name}"></td>
                                <td th:text="${c.surname}"></td>
                                <td th:text="${c.phone}"></td>
                                <td th:text="${c.email}"></td>
                                <td class="text-center">
                                    <a th:href="@{'/contact/delete/'+${c.id}}" th:method="delete" class="btn btn-sm btn-danger">Elimina</a>
                                    <a th:href="@{'/contact/'+${c.id}}" class="btn btn-sm btn-outline-primary ms-2">Dettagli</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
