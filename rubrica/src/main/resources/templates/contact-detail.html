<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <title>Dettagli contatto</title>
</head>
<body>
    
</body>
    <div class="container">
        <div class="col-3">
            <div class="alert alert-success" role="alert" th:if="${newContact != null}">
                <h1>Contatto creato</h1>

            </div>
            <h2 th:text="${contact.name + ' ' + contact.surname}">Contatto creato  </h2>
        </div>

        <div>
            <h2>Telefono: <span th:text="${contact.phone}">Telefono</span></h2>
        </div>

        <div>
            <h2>
                Email: <span th:text="${contact.email}">Email</span>
            </h2>
        </div>

        <div>
            <a th:href="@{/}" class="btn btn
            -primary">Home</a>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</html>
