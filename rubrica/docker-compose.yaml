services:
  mysql-db:
    image: mysql:9.0
    container_name: mysql
    environment:
      - MYSQL_DATABASE: rubrica_db
      - MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306" #mappa la porta del container alla stessa porta di codespace
  #spring-backend:

  networks:
    app-networks:
      driver: bridge
      